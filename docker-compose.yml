services:
  student_lb:
    container_name: student_lb
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - student_service

  gateway_service:
    container_name: APIgateway_service
    build: 
      context: ./APIGateway_Microservice
      dockerfile: Dockerfile

    ports:
      - "80:3000"

    environment:
      - JWT_SECRETE=...
    depends_on:
      - auth_service
      - librarian_service
      - student_lb

  auth_service:
    container_name: authentication_service
    build: 
      context: ./Authentication_Microservice
      dockerfile: Dockerfile

    environment:
      - JWT_SECRETE=...
      - MONGO_URI=...

  librarian_service:
    container_name: librarian_service
    build: 
      context: ./Librarian_Microservice
      dockerfile: Dockerfile

  student_service:
    build: 
      context: ./Student_Microservice
      dockerfile: Dockerfile

    deploy:
      replicas: 2

networks:
  default:
    name: library-network
