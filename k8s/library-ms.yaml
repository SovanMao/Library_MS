apiVersion: v1
kind: Secret
metadata:
  name: libraryms-secrets
type: Opaque
stringData:
  JWT_SECRETE: "<JWT_SECRETE>"
  MONGO_URI: "<MONGO_URI>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: student-lb-nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      upstream student_backend {
        server student-backend:5002;
      }

      server {
        listen 80;
        access_log /shared/logs/access.log;
        error_log /shared/logs/error.log;

        location / {
          proxy_pass http://student_backend;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: sovanmao/libraryms-api-gateway:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: JWT_SECRETE
              valueFrom:
                secretKeyRef:
                  name: libraryms-secrets
                  key: JWT_SECRETE
            - name: STUDENT_SERVICE_URL
              value: http://student-service:80
            - name: LIBRARIAN_SERVICE_URL
              value: http://librarian-service:5001
            - name: AUTH_SERVICE_URL
              value: http://auth-service:4000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentication-service
  template:
    metadata:
      labels:
        app: authentication-service
    spec:
      containers:
        - name: authentication-service
          image: sovanmao/libraryms-authentication:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: JWT_SECRETE
              valueFrom:
                secretKeyRef:
                  name: libraryms-secrets
                  key: JWT_SECRETE
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: libraryms-secrets
                  key: MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  selector:
    app: authentication-service
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librarian-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: librarian-service
  template:
    metadata:
      labels:
        app: librarian-service
    spec:
      containers:
        - name: librarian-service
          image: sovanmao/libraryms-librarian:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: libraryms-secrets
                  key: MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: librarian-service
spec:
  type: ClusterIP
  selector:
    app: librarian-service
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-backend
  template:
    metadata:
      labels:
        app: student-backend
    spec:
      containers:
        - name: student-backend
          image: sovanmao/libraryms-student:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: libraryms-secrets
                  key: MONGO_URI
---
apiVersion: v1
kind: Service
metadata:
  name: student-backend
spec:
  type: ClusterIP
  selector:
    app: student-backend
  ports:
    - port: 5002
      targetPort: 5002
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-service
  template:
    metadata:
      labels:
        app: student-service
    spec:
      volumes:
        - name: student-lb-config
          configMap:
            name: student-lb-nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: student-lb-logs
          emptyDir: {}
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: student-lb-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: student-lb-logs
              mountPath: /shared/logs
        - name: log-reader
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "sleep 2; tail -n+1 -F /shared/logs/access.log"]
          volumeMounts:
            - name: student-lb-logs
              mountPath: /shared/logs
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  type: ClusterIP
  selector:
    app: student-service
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libraryms-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: libraryms.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80